<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset Complete — TyreHub</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            text-align: center;
        }
        .icon { font-size: 60px; margin-bottom: 20px; }
        .brand-name { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 24px; }
        .brand-name span { color: #e85d04; }
        h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }
        p { color: #6c757d; font-size: 15px; line-height: 1.6; margin-bottom: 28px; }
        .btn {
            display: inline-block;
            padding: 13px 32px;
            background: linear-gradient(135deg, #e85d04 0%, #f48c06 100%);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.88; }
        .success-badge {
            display: inline-block;
            background: #d1fae5;
            color: #065f46;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand-name">Tyre<span>Hub</span></div>
        <div class="icon">🎉</div>
        <div class="success-badge">✅ Success</div>
        <h1>Password Reset Complete</h1>
        <p>
            Your password has been successfully updated.
            You can now log in to TyreHub with your new password.
        </p>
        <a href="/admin/" class="btn">Log In to Admin</a>
    </div>
</body>
</html>
