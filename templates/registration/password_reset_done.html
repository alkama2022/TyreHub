<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Email Sent — TyreHub</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 48px 40px;
            width: 100%;
            max-width: 460px;
            text-align: center;
        }
        .icon { font-size: 56px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 700; color: #1a1a2e; margin-bottom: 12px; }
        p { color: #6c757d; font-size: 15px; line-height: 1.6; margin-bottom: 16px; }
        .brand-name { font-size: 18px; font-weight: 700; color: #1a1a2e; margin-bottom: 32px; }
        .brand-name span { color: #e85d04; }
        .btn {
            display: inline-block;
            padding: 12px 28px;
            background: linear-gradient(135deg, #e85d04 0%, #f48c06 100%);
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn:hover { opacity: 0.88; }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand-name">Tyre<span>Hub</span></div>
        <div class="icon">📧</div>
        <h1>Check Your Email</h1>
        <p>
            We've sent a password reset link to your email address.
            Please check your inbox (and spam folder) and click the link to reset your password.
        </p>
        <p style="font-size:13px; color:#adb5bd;">
            The link expires in <strong>24 hours</strong>.
        </p>
        <a href="/admin/" class="btn">Back to Admin</a>
    </div>
</body>
</html>
